<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — MyProt</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0a0a0f;
      --panel:     #11111a;
      --border:    rgba(255,255,255,0.07);
      --accent:    #c8a96e;
      --accent2:   #e8c994;
      --text:      #e8e6df;
      --muted:     #6b6a64;
      --error:     #e07070;
      --input-bg:  rgba(255,255,255,0.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── animated background ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(100,80,200,0.06) 0%, transparent 60%);
    }
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width:340px; height:340px; top:-60px; left:-60px; background:rgba(200,169,110,0.10); animation-delay:0s; }
    .orb-2 { width:280px; height:280px; bottom:-40px; right:-40px; background:rgba(120,80,220,0.08); animation-delay:-4s; }
    .orb-3 { width:200px; height:200px; top:50%; right:10%; background:rgba(200,169,110,0.05); animation-delay:-8s; }

    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 100%{transform:translate(30px,20px) scale(1.1)} }

    /* ── layout ── */
    .wrapper {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }

    /* ── card ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 44px 44px;
      box-shadow:
        0 0 0 1px rgba(200,169,110,0.06),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(28px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── monogram / logo ── */
    .logo-wrap {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 36px;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .monogram {
      width: 42px; height: 42px;
      border: 1.5px solid var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 600; color: var(--accent);
      letter-spacing: 1px;
      box-shadow: 0 0 16px rgba(200,169,110,0.15), inset 0 0 10px rgba(200,169,110,0.05);
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300; letter-spacing: 3px;
      color: var(--text); text-transform: uppercase;
    }

    /* ── headings ── */
    .heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 300; line-height: 1.1;
      letter-spacing: -0.5px; color: var(--text);
      margin-bottom: 6px;
      animation: fadeUp 0.5s 0.25s ease both;
    }
    .heading em { font-style: italic; color: var(--accent); }
    .sub {
      font-size: 13px; color: var(--muted); font-weight: 300;
      margin-bottom: 36px; letter-spacing: 0.2px;
      animation: fadeUp 0.5s 0.32s ease both;
    }

    /* ── divider ── */
    .divider {
      height: 1px; background: var(--border);
      margin-bottom: 32px;
      animation: scaleX 0.6s 0.35s ease both;
      transform-origin: left;
    }
    @keyframes scaleX { from{transform:scaleX(0)} to{transform:scaleX(1)} }

    /* ── form ── */
    .form-group {
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease both;
    }
    .form-group:nth-child(1) { animation-delay: 0.38s; }
    .form-group:nth-child(2) { animation-delay: 0.44s; }

    label {
      display: block;
      font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); transition: color .25s;
      pointer-events: none;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 300;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
    }
    input:focus {
      border-color: rgba(200,169,110,0.45);
      background: rgba(200,169,110,0.04);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.08);
    }
    input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--accent); }

    /* password toggle */
    .pw-toggle {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); transition: color .2s; padding: 2px;
    }
    .pw-toggle:hover { color: var(--accent); }

    /* ── remember / forgot row ── */
    .row-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px;
      animation: fadeUp 0.5s 0.5s ease both;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      text-transform: none; letter-spacing: 0;
    }
    input[type="checkbox"] {
      appearance: none; width: 15px; height: 15px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--input-bg); cursor: pointer;
      transition: border-color .2s, background .2s;
      flex-shrink: 0; position: relative;
    }
    input[type="checkbox"]:checked {
      background: var(--accent); border-color: var(--accent);
    }
    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute; left: 4px; top: 1px;
      width: 5px; height: 9px;
      border: 2px solid #0a0a0f; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .forgot {
      font-size: 13px; color: var(--accent);
      text-decoration: none; letter-spacing: 0.2px;
      transition: opacity .2s;
    }
    .forgot:hover { opacity: 0.7; }

    /* ── submit button ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(200,169,110,0.25);
      animation: fadeUp 0.5s 0.55s ease both;
    }
    .btn-login:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(200,169,110,0.35); }
    .btn-login:active { transform: scale(0.98); }

    /* ── flash messages ── */
    .flash {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s ease both;
    }
    .flash.error   { background: rgba(224,112,112,0.1); border:1px solid rgba(224,112,112,0.25); color: var(--error); }
    .flash.success { background: rgba(100,200,120,0.1); border:1px solid rgba(100,200,120,0.25); color: #80e09a; }

    /* ── footer ── */
    .card-footer {
      margin-top: 28px; text-align: center;
      font-size: 13px; color: var(--muted);
      animation: fadeUp 0.5s 0.6s ease both;
    }
    .card-footer a { color: var(--accent); text-decoration: none; transition: opacity .2s; }
    .card-footer a:hover { opacity: 0.7; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="wrapper">
  <div class="card">

    <div class="logo-wrap">
      <div class="monogram">MP</div>
      <span class="brand-name">MyProt</span>
    </div>

    <h1 class="heading">Welcome <em>back</em></h1>
    <p class="sub">Sign in to continue to your dashboard</p>
    <div class="divider"></div>

    <!-- Flask flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <!-- CSRF token if you use Flask-WTF -->
      <!-- {{ form.hidden_tag() }} -->

      <div class="form-group">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com"
                 value="{{ request.form.get('email', '') }}"
                 autocomplete="email" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" name="password"
                 placeholder="••••••••"
                 autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePw()" id="pw-btn" aria-label="Show/hide password">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="row-meta">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" id="remember" />
          Remember me
        </label>
        <a href="{{ url_for('forgot_password') if 'forgot_password' in dir() else '#' }}" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="card-footer">
      Don't have an account? <a href="{{ url_for('register') if 'register' in dir() else '#' }}">Create one</a>
    </div>

  </div>
</div>

<script>
  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('pw-btn');
    const isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.innerHTML = isText
      ? `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
           <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
           <circle cx="12" cy="12" r="3"/>
         </svg>`
      : `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
           <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>
         </svg>`;
  }
</script>
</body>
</html>
